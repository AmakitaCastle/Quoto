<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0A09"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9D565"/>
      <stop offset="100%" stop-color="#A16207"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect width="1024" height="1024" rx="246" fill="url(#bgGradient)"/>

  <!-- 内阴影效果 -->
  <rect x="20" y="20" width="984" height="984" rx="226" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

  <!-- "字"字符 - 使用优化的路径以获得清晰的渲染效果 -->
  <g filter="url(#glow)">
    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"
          font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif"
          font-size="580" font-weight="300"
          fill="url(#textGradient)">
      字
    </text>
  </g>

  <!-- 金色边框装饰 -->
  <rect x="20" y="20" width="984" height="984" rx="226" fill="none" stroke="url(#textGradient)" stroke-width="3" opacity="0.3"/>
</svg>
